<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Calculator</title>

    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Fira Sans", sans-serif;
        }
        .calculator-card {
            width: 350px;
            background: #fff;
        }
        .display-screen {
            background-color: black;
            color: #fff;
            padding: 20px;
            text-align: right;
            font-size: 2.5rem;
            min-height: 100px;
            word-wrap: break-word;
            word-break: break-all;
        }
        .btn-calc {
            height: 70px;
            font-size: 1.25rem;
            border-radius: 0;
            background-color: gray;
        }
        .btn-operator {
            background-color: #ff9f0a;
            color: white;
        }
        .btn-equal {
            background-color: #0d6efd;
            color: white;
        }
        .btn-clear {
            background-color: #dc3545;
            color: white;
        }
        .btn-number {
            background-color: gray;
            color: #212529;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <div id="display" class="display-screen">0</div>
    
    <div class="row g-0">
        <div class="col-3"><button class="btn btn-calc btn-clear w-100" onclick="clearDisplay()">C</button></div>
        <div class="col-3"><button class="btn btn-calc btn-number w-100" onclick="deleteLast()">⌫</button></div>
        <div class="col-3"><button class="btn btn-calc btn-number w-100" onclick="setOperator('%')">%</button></div>
        <div class="col-3"><button class="btn btn-calc btn-operator w-100" onclick="setOperator('/')">÷</button></div>
    </div>
    
    <div class="row g-0">
        <div class="col-3"><button class="btn btn-calc btn-number w-100" onclick="appendNumber('7')">7</button></div>
        <div class="col-3"><button class="btn btn-calc btn-number w-100" onclick="appendNumber('8')">8</button></div>
        <div class="col-3"><button class="btn btn-calc btn-number w-100" onclick="appendNumber('9')">9</button></div>
        <div class="col-3"><button class="btn btn-calc btn-operator w-100" onclick="setOperator('*')">×</button></div>
    </div>
    
    <div class="row g-0">
        <div class="col-3"><button class="btn btn-calc btn-number w-100" onclick="appendNumber('4')">4</button></div>
        <div class="col-3"><button class="btn btn-calc btn-number w-100" onclick="appendNumber('5')">5</button></div>
        <div class="col-3"><button class="btn btn-calc btn-number w-100" onclick="appendNumber('6')">6</button></div>
        <div class="col-3"><button class="btn btn-calc btn-operator w-100" onclick="setOperator('-')">−</button></div>
    </div>
    
    <div class="row g-0">
        <div class="col-3"><button class="btn btn-calc btn-number w-100" onclick="appendNumber('1')">1</button></div>
        <div class="col-3"><button class="btn btn-calc btn-number w-100" onclick="appendNumber('2')">2</button></div>
        <div class="col-3"><button class="btn btn-calc btn-number w-100" onclick="appendNumber('3')">3</button></div>
        <div class="col-3"><button class="btn btn-calc btn-operator w-100" onclick="setOperator('+')">+</button></div>
    </div>
    
    <div class="row g-0">
        <div class="col-6"><button class="btn btn-calc btn-number w-100" onclick="appendNumber('0')">0</button></div>
        <div class="col-3"><button class="btn btn-calc btn-number w-100" onclick="appendDot()">.</button></div>
        <div class="col-3"><button class="btn btn-calc btn-equal w-100" onclick="calculateResult()">=</button></div>
    </div>
</div>

<script>
    let currentInput = "0";
    let previousInput = "";
    let operator = null;
    let shouldResetScreen = false;

    const displayElement = document.getElementById("display");

    function updateDisplay() {
        displayElement.innerText = currentInput;
    }

    function appendNumber(number) {
        if (currentInput === "0" || shouldResetScreen) {
            currentInput = number;
            shouldResetScreen = false;
        } else {
            currentInput += number;
        }
        updateDisplay();
    }

    function appendDot() {
        if (shouldResetScreen) {
            currentInput = "0.";
            shouldResetScreen = false;
        } else if (!currentInput.includes(".")) {
            currentInput += ".";
        }
        updateDisplay();
    }

    function setOperator(op) {
        if (operator !== null) {
            calculateResult();
        }
        previousInput = currentInput;
        operator = op;
        shouldResetScreen = true;
    }

    function calculateResult() {
        if (operator === null || shouldResetScreen) return;

        let result = 0;
        const num1 = parseInt(previousInput);
        const num2 = parseInt(currentInput);

        switch (operator) {
            case "+":
                result = num1 + num2;
                break;
            case "-":
                result = num1 - num2;
                break;
            case "*":
                result = num1 * num2;
                break;
            case "/":
                if (num2 === 0) {
                    alert("Error: Division by zero");
                    clearDisplay();
                    return;
                } else {
                    result = num1 / num2;
                }
                break;
            case "%":
                result = num1 % num2;
                break;
            default:
                return;
        }

        currentInput = result.toString();
        operator = null;
        shouldResetScreen = true;
        updateDisplay();
    }

    function clearDisplay() {
        currentInput = "0";
        previousInput = "";
        operator = null;
        shouldResetScreen = false;
        updateDisplay();
    }

    function deleteLast() {
        if (currentInput.length > 1) {
            currentInput = currentInput.slice(0, -1);
        } else {
            currentInput = "0";
        }
        updateDisplay();
    }
</script>

</body>
</html>
