<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Experiment Two</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: "Fira Sans", sans-serif;
      }
    </style>
  </head>
  <body>
    <div
      class="container d-flex justify-content-center flex-column"
      style="height: 80vh !important"
    >
      <p class="fs-1">Event Handling</p>
      <div class="d-flex gap-4 mt-4" style="height: 5vh !important">
        <p class="fs-3">Enter Name</p>
        <input
          type="text"
          id="name"
          placeholder="Your name"
          class="form-control border border-black"
          style="width: 20vw"
        />
      </div>
      <div class="d-flex gap-4 mt-4" style="height: 5vh !important">
        <p class="fs-3">Enter Email</p>
        <input
          type="email"
          id="email"
          placeholder="Your email"
          class="form-control border border-black"
          style="width: 20vw"
        />
      </div>
      <div class="d-flex gap-4 mt-4" style="height: 5vh !important">
        <p class="fs-3">Enter Password</p>
        <input
          type="password"
          id="password"
          placeholder="Your password"
          class="form-control border border-black"
          style="width: 20vw"
        />
      </div>
      <button
        class="btn btn-primary mt-5"
        id="submit"
        type="submit"
        style="width: 10vw"
      >
        Submit
      </button>
    </div>
  </body>
  <script>
    const nameElement = document.getElementById("name");
    const emailElement = document.getElementById("email");
    const passwordElement = document.getElementById("password");
    const button = document.getElementById("submit");
    button.addEventListener("click", handleOnClickEvent);

    function handleOnClickEvent(event) {
      event.preventDefault();
      if (
        nameElement.value === "" ||
        emailElement.value === "" ||
        passwordElement.value === ""
      ) {
        alert("Please fill up the fields");
      } else {
        alert(nameElement.value + " has been logged in");
      }
    }
  </script>
</html>
